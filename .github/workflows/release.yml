name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.9.0). Used only for manual runs without a tag.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ inputs.version }}" ]]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(grep -m1 '<Version>' Directory.Build.props | sed 's/.*<Version>\(.*\)<\/Version>.*/\1/')" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Publish GUI
        run: >
          dotnet publish src/Prokudin.Gui/Prokudin.Gui.csproj
          -c Release -r win-x64
          -p:Version=${{ steps.version.outputs.value }}
          -o dist/gui

      - name: Publish CLI
        run: >
          dotnet publish src/Prokudin.Cli/Prokudin.Cli.csproj
          -c Release -r win-x64
          -p:Version=${{ steps.version.outputs.value }}
          -o dist/cli

      - name: Smoke test CLI
        run: dist/cli/prokudin.exe --help

      - name: Install Inno Setup
        shell: pwsh
        run: |
          $installer = Join-Path $env:RUNNER_TEMP 'innosetup-6.7.3.exe'
          $url = 'https://github.com/jrsoftware/issrc/releases/download/is-6_7_3/innosetup-6.7.3.exe'
          Invoke-WebRequest -Uri $url -OutFile $installer
          Start-Process -FilePath $installer -ArgumentList '/VERYSILENT /SUPPRESSMSGBOXES /NORESTART /SP-' -Wait
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { throw "ISCC not found at $iscc" }
          Write-Host "Inno Setup installed: $iscc"

      - name: Package Windows
        shell: pwsh
        run: >
          ./packaging/windows/build-windows.ps1
          -Version ${{ steps.version.outputs.value }}
          -GuiPublishDir dist/gui
          -CliPublishDir dist/cli
          -OutputDir dist/release

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: prokudin-win-x64
          path: dist/release/*

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ inputs.version }}" ]]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(grep -m1 '<Version>' Directory.Build.props | sed 's/.*<Version>\(.*\)<\/Version>.*/\1/')" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Publish GUI
        run: >
          dotnet publish src/Prokudin.Gui/Prokudin.Gui.csproj
          -c Release -r linux-x64
          -p:Version=${{ steps.version.outputs.value }}
          -o dist/gui

      - name: Publish CLI
        run: >
          dotnet publish src/Prokudin.Cli/Prokudin.Cli.csproj
          -c Release -r linux-x64
          -p:Version=${{ steps.version.outputs.value }}
          -o dist/cli

      - name: Smoke test CLI
        run: chmod +x dist/cli/prokudin && dist/cli/prokudin --help

      - name: Package Linux portable
        run: >
          chmod +x packaging/linux/build-portable.sh packaging/linux/build-appimage.sh &&
          ./packaging/linux/build-portable.sh
          ${{ steps.version.outputs.value }}
          dist/gui dist/cli dist/release

      - name: Package AppImage
        run: >
          ./packaging/linux/build-appimage.sh
          ${{ steps.version.outputs.value }}
          dist/gui dist/release

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: prokudin-linux-x64
          path: dist/release/*

  release:
    needs:
      - build-win
      - build-linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ inputs.version }}" ]]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            value=$(grep -m1 '<Version>' Directory.Build.props | sed 's/.*<Version>\(.*\)<\/Version>.*/\1/')
            echo "value=$value" >> "$GITHUB_OUTPUT"
            echo "tag=v$value" >> "$GITHUB_OUTPUT"
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare flat release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( \
            -name '*.exe' -o \
            -name '*.zip' -o \
            -name '*.tar.gz' -o \
            -name '*.AppImage' \
          \) -exec cp -t release-assets/ {} +
          ls -la release-assets

      - name: Create checksums
        working-directory: release-assets
        run: |
          sha256sum * | sort > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Prokudin ${{ steps.version.outputs.value }}
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
