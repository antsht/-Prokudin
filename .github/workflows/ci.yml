name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Prokudin.slnx

      - name: Build
        run: dotnet build Prokudin.slnx -c Release --no-restore

      - name: Test
        run: dotnet test Prokudin.slnx -c Release --no-build --verbosity normal
